<!-- src/app/shared/components/accessibility-mode/accessibility-mode.component.html -->

<section class="accessibility" aria-label="Barrierefreiheit Einstellungen">
  <button class="accessibility__trigger" type="button" [attr.aria-expanded]="istGeoeffnet()" aria-controls="accessibility-panel" (click)="schalteBedienfeld()">
    <span class="material-symbols-outlined" aria-hidden="true">accessibility_new</span>
    <span>Access</span>
  </button>

  @if (istGeoeffnet()) {
    <div id="accessibility-panel" class="accessibility__panel">
      <h2>Barrierefreiheit</h2>
      <p>Ansicht für diese Sitzung anpassen.</p>

      <button class="accessibility__option" type="button" [attr.aria-pressed]="grosseSchrift()" (click)="schalteGrosseSchrift()">
        <span class="material-symbols-outlined" aria-hidden="true">format_size</span>
        <span>Größere Schrift</span>
      </button>

      <button class="accessibility__option" type="button" [attr.aria-pressed]="hoherKontrast()" (click)="schalteKontrast()">
        <span class="material-symbols-outlined" aria-hidden="true">contrast</span>
        <span>Mehr Kontrast</span>
      </button>

      <button class="accessibility__option" type="button" [attr.aria-pressed]="reduzierteBewegung()" (click)="schalteBewegung()">
        <span class="material-symbols-outlined" aria-hidden="true">motion_photos_off</span>
        <span>Bewegung reduzieren</span>
      </button>
    </div>
  }
</section>
