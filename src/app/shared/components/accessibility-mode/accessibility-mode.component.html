<!-- src/app/shared/components/accessibility-mode/accessibility-mode.component.html -->

<section class="accessibility" aria-label="Barrierefreiheit Einstellungen">
  <button class="accessibility__trigger" type="button" [attr.aria-expanded]="istGeoeffnet()" aria-controls="accessibility-panel" aria-label="Barrierefreiheit öffnen" aria-haspopup="dialog" (click)="schalteBedienfeld()">
    <span class="material-symbols-outlined" aria-hidden="true">accessibility_new</span>
  </button>

  @if (istGeoeffnet()) {
    <div id="accessibility-panel" class="accessibility__panel" role="dialog" aria-modal="false" aria-labelledby="accessibility-title">
      <div class="accessibility__head">
        <div>
          <p class="accessibility__kicker">Ansicht anpassen</p>
          <h2 id="accessibility-title">Barrierefreiheit</h2>
        </div>
        <button class="accessibility__close" type="button" aria-label="Barrierefreiheit schließen" (click)="schliesseBedienfeld()">
          <span class="material-symbols-outlined" aria-hidden="true">close</span>
        </button>
      </div>

      <div class="accessibility__quick">
        <button class="accessibility__option accessibility__option--wide" type="button" [attr.aria-pressed]="istKomfortAktiv('ruhig')" (click)="aktiviereRuhigeAnsicht()">
          Ruhige Ansicht
        </button>
        <button class="accessibility__option accessibility__option--wide accessibility__option--ghost" type="button" (click)="setzeZurueck()">
          Zurücksetzen
        </button>
      </div>

      <div class="accessibility__grid">
        <div class="accessibility__group" role="group" aria-label="Animationen">
          <h3>Animationen</h3>
          <div class="accessibility__options accessibility__options--three">
            <button class="accessibility__option" type="button" [class.is-active]="istBewegungAktiv('voll')" [attr.aria-pressed]="istBewegungAktiv('voll')" (click)="setzeBewegung('voll')">Normal</button>
            <button class="accessibility__option" type="button" [class.is-active]="istBewegungAktiv('reduziert')" [attr.aria-pressed]="istBewegungAktiv('reduziert')" (click)="setzeBewegung('reduziert')">Reduziert</button>
            <button class="accessibility__option" type="button" [class.is-active]="istBewegungAktiv('aus')" [attr.aria-pressed]="istBewegungAktiv('aus')" (click)="setzeBewegung('aus')">Aus</button>
          </div>
        </div>

        <div class="accessibility__group" role="group" aria-label="Schriftgröße">
          <h3>Schrift</h3>
          <div class="accessibility__options accessibility__options--two">
            <button class="accessibility__option" type="button" [class.is-active]="istSchriftAktiv('normal')" [attr.aria-pressed]="istSchriftAktiv('normal')" (click)="setzeSchrift('normal')">Normal</button>
            <button class="accessibility__option" type="button" [class.is-active]="istSchriftAktiv('gross')" [attr.aria-pressed]="istSchriftAktiv('gross')" (click)="setzeSchrift('gross')">Größer</button>
          </div>
        </div>

        <div class="accessibility__group" role="group" aria-label="Kontrast">
          <h3>Kontrast</h3>
          <div class="accessibility__options accessibility__options--two">
            <button class="accessibility__option" type="button" [class.is-active]="istKontrastAktiv('normal')" [attr.aria-pressed]="istKontrastAktiv('normal')" (click)="setzeKontrast('normal')">Normal</button>
            <button class="accessibility__option" type="button" [class.is-active]="istKontrastAktiv('hoch')" [attr.aria-pressed]="istKontrastAktiv('hoch')" (click)="setzeKontrast('hoch')">Hoch</button>
          </div>
        </div>

        <div class="accessibility__group" role="group" aria-label="Neuromodus">
          <h3>Neuromodus</h3>
          <div class="accessibility__options accessibility__options--three">
            <button class="accessibility__option" type="button" [class.is-active]="istKomfortAktiv('standard')" [attr.aria-pressed]="istKomfortAktiv('standard')" (click)="setzeKomfort('standard')">Standard</button>
            <button class="accessibility__option" type="button" [class.is-active]="istKomfortAktiv('neuro')" [attr.aria-pressed]="istKomfortAktiv('neuro')" (click)="setzeKomfort('neuro')">Neuro</button>
            <button class="accessibility__option" type="button" [class.is-active]="istKomfortAktiv('ruhig')" [attr.aria-pressed]="istKomfortAktiv('ruhig')" (click)="setzeKomfort('ruhig')">Ruhig</button>
          </div>
        </div>

        <div class="accessibility__group accessibility__group--wide" role="group" aria-label="Farbwahrnehmung">
          <h3>Farben</h3>
          <div class="accessibility__options accessibility__options--colors">
            <button class="accessibility__option" type="button" [class.is-active]="istFarbeAktiv('standard')" [attr.aria-pressed]="istFarbeAktiv('standard')" (click)="setzeFarbe('standard')">Standard</button>
            <button class="accessibility__option" type="button" [class.is-active]="istFarbeAktiv('rot-gruen-1')" [attr.aria-pressed]="istFarbeAktiv('rot-gruen-1')" (click)="setzeFarbe('rot-gruen-1')">Rot-Grün 1</button>
            <button class="accessibility__option" type="button" [class.is-active]="istFarbeAktiv('rot-gruen-2')" [attr.aria-pressed]="istFarbeAktiv('rot-gruen-2')" (click)="setzeFarbe('rot-gruen-2')">Rot-Grün 2</button>
            <button class="accessibility__option" type="button" [class.is-active]="istFarbeAktiv('blau-gelb')" [attr.aria-pressed]="istFarbeAktiv('blau-gelb')" (click)="setzeFarbe('blau-gelb')">Blau-Gelb</button>
            <button class="accessibility__option" type="button" [class.is-active]="istFarbeAktiv('graustufen')" [attr.aria-pressed]="istFarbeAktiv('graustufen')" (click)="setzeFarbe('graustufen')">Graustufen</button>
          </div>
        </div>

        <div class="accessibility__group accessibility__group--wide" role="group" aria-label="Bildschirmlupe">
          <h3>Bildschirmlupe</h3>
          <div class="accessibility__options accessibility__options--two">
            <button class="accessibility__option" type="button" [class.is-active]="istLupeAktiv('aus')" [attr.aria-pressed]="istLupeAktiv('aus')" (click)="setzeLupe('aus')">Aus</button>
            <button class="accessibility__option" type="button" [class.is-active]="istLupeAktiv('an')" [attr.aria-pressed]="istLupeAktiv('an')" (click)="setzeLupe('an')">Ein</button>
          </div>
        </div>
      </div>

      <p class="accessibility__note">Die Auswahl wird nur lokal im Browser gespeichert. Die Bildschirmlupe ist für Maus und Trackpad optimiert.</p>
    </div>
  }
</section>
